<div id="search-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="search-title" hidden>
    <div class="modal-panel">
        <div class="modal-header">
            <h2 id="search-title">Search</h2>
            <button class="close-button icon-button" type="button" aria-label="Close search">
                <i class="fas fa-xmark" aria-hidden="true"></i>
            </button>
        </div>
        <input type="search" id="search-input" autocomplete="off" placeholder="Search LoRaWAN, publication, teaching...">
        <p id="search-count" class="search-count" aria-live="polite"></p>
        <div id="search-results" class="search-results"></div>
    </div>
</div>
